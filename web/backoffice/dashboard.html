<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Nexus Admin</title>
    <link rel="stylesheet" href="dash.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="icon"
        href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSxa1QoYtdH5IN1brKXbFixp6rIJv1YbEAeJg&s">
</head>
<body>

<header class="topbar">
    <div class="logo">
        <h1>NEXUS ADMIN</h1>
    </div>
    <button id="logoutBtn">Sair</button>
</header>

<main>

    <section class="cards">
        <div class="card neon">
            <h3>Total de Usuários</h3>
            <p id="totalUsers">...</p>
        </div>
    </section>

    <!-- TABELAS -->
    <section class="tables">

        <div class="table-container">
            <h2>Usuários</h2>
            <table>
                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Criado em</th>
                        <th>Ação</th>
                    </tr>
                </thead>
                <tbody id="userTable"></tbody>
            </table>
        </div>

        <div class="table-container">
            <h2>Últimas Mensagens</h2>
            <table>
                <thead>
                    <tr>
                        <th>User</th>
                        <th>Mensagem</th>
                    </tr>
                </thead>
                <tbody id="messageTable"></tbody>
            </table>
        </div>

    </section>

</main>

<script src="dash.js"></script>
</body>
</html>
